apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: realtime-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/paulchen8206/GenAI-Enabled-Data-Platform-Architecture-and-Engineering.git
    targetRevision: main
    path: cicd/charts
    helm:
      releaseName: realtime-dev
      valueFiles:
      - ../k8s/helm/values/values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: realtime-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true