{{- if or .Values.postgres.enabled .Values.odsConnect.enabled .Values.dbt.enabled .Values.airflow.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-warehouse-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: warehouse
data:
  init.sql: |
    create schema if not exists landing;
    create schema if not exists bronze;
    create schema if not exists silver;
    create schema if not exists gold;

    create table if not exists public.iceberg_tables (
      catalog_name varchar(255) not null,
      table_namespace varchar(255) not null,
      table_name varchar(255) not null,
      metadata_location varchar(1000),
      previous_metadata_location varchar(1000),
      primary key (catalog_name, table_namespace, table_name)
    );

    create table if not exists public.iceberg_namespace_properties (
      catalog_name varchar(255) not null,
      namespace varchar(255) not null,
      property_key varchar(255) not null,
      property_value varchar(1000),
      primary key (catalog_name, namespace, property_key)
    );

    create table if not exists landing.sales_order (
      orderid text,
      ordertimestamp timestamptz,
      customerid text,
      customername text,
      customeremail text,
      customersegment text,
      currency text,
      ordertotal numeric,
      lineitemcount integer
    );

    create table if not exists landing.sales_order_line_item (
      orderid text,
      ordertimestamp timestamptz,
      customerid text,
      customername text,
      lineitemid text,
      sku text,
      productname text,
      quantity integer,
      unitprice numeric,
      linetotal numeric,
      currency text
    );

    create table if not exists landing.customer_sales (
      customerid text,
      customername text,
      customeremail text,
      customersegment text,
      ordercount bigint,
      totalspent numeric,
      lastorderid text,
      updatedat timestamptz,
      currency text
    );

    create table if not exists landing.mdm_customer360 (
      customer_id text,
      customer_name text,
      customer_email text,
      customer_segment text,
      currency text,
      first_order_timestamp timestamptz,
      last_order_timestamp timestamptz,
      projected_order_count integer,
      projected_total_spent numeric(18,2),
      projection_updated_at timestamptz,
      updated_at timestamptz
    );

    create table if not exists landing.mdm_product_master (
      product_id text,
      product_name text,
      currency text,
      first_seen_at timestamptz,
      last_seen_at timestamptz,
      orders_count integer,
      units_sold integer,
      avg_unit_price numeric(18,2),
      updated_at timestamptz
    );

    create table if not exists landing.mdm_date (
      date_key integer,
      full_date date,
      day_of_month integer,
      day_of_week integer,
      day_name text,
      week_of_year integer,
      month_of_year integer,
      month_name text,
      quarter_of_year integer,
      year_number integer,
      is_weekend boolean,
      created_at timestamptz,
      updated_at timestamptz
    );
  dbt_project.yml: |
    name: realtime_analytics
    version: 1.0.0
    config-version: 2
    profile: realtime_analytics
    model-paths: ["models"]
    target-path: target
    clean-targets: ["target", "dbt_packages"]
    models:
      realtime_analytics:
        +materialized: view
        bronze:
          +schema: bronze
        silver:
          +schema: silver
          +materialized: table
        gold:
          +schema: gold
          +materialized: table
  profiles.yml: |
    realtime_analytics:
      target: trino
      outputs:
        dev:
          type: postgres
          host: {{ include "vision.serviceName" (dict "root" . "key" "snowflake-mimic") }}
          port: 5432
          user: {{ .Values.postgres.auth.user }}
          password: {{ .Values.postgres.auth.password }}
          dbname: {{ .Values.postgres.auth.database }}
          schema: public
          threads: 4
        trino:
          type: trino
          user: analytics
          host: {{ include "vision.serviceName" (dict "root" . "key" "trino") }}
          port: 8080
          catalog: lakehouse
          schema: streaming
          threads: 4
  generate_schema_name.sql: |
    {% macro generate_schema_name(custom_schema_name, node) -%}
      {%- if custom_schema_name is none -%}
        {{ "{{" }} target.schema {{ "}}" }}
      {%- else -%}
        {{ "{{" }} custom_schema_name | trim {{ "}}" }}
      {%- endif -%}
    {%- endmacro %}
  stg_sales_order.sql: |
    {% if target.type == 'postgres' %}
    select
      orderid as order_id,
      ordertimestamp as order_timestamp,
      customerid as customer_id,
      customername as customer_name,
      customeremail as customer_email,
      customersegment as customer_segment,
      currency,
      ordertotal as order_total,
      lineitemcount as line_item_count
    from landing.sales_order
    {% else %}
    select
      orderid as order_id,
      ordertimestamp as order_timestamp,
      customerid as customer_id,
      customername as customer_name,
      customeremail as customer_email,
      customersegment as customer_segment,
      currency,
      cast(null as double) as order_total,
      cast(lineitemcount as integer) as line_item_count
    from warehouse.landing.sales_order
    {% endif %}
  stg_sales_order_line_item.sql: |
    {% if target.type == 'postgres' %}
    select
      orderid as order_id,
      ordertimestamp as order_timestamp,
      customerid as customer_id,
      customername as customer_name,
      lineitemid as line_item_id,
      sku,
      productname as product_name,
      quantity,
      unitprice as unit_price,
      linetotal as line_total,
      currency
    from landing.sales_order_line_item
    {% else %}
    select
      orderid as order_id,
      ordertimestamp as order_timestamp,
      customerid as customer_id,
      customername as customer_name,
      lineitemid as line_item_id,
      sku,
      productname as product_name,
      cast(quantity as integer) as quantity,
      cast(null as double) as unit_price,
      cast(null as double) as line_total,
      currency
    from warehouse.landing.sales_order_line_item
    {% endif %}
  stg_customer_sales.sql: |
    {% if target.type == 'postgres' %}
    select
      customerid as customer_id,
      customername as customer_name,
      customeremail as customer_email,
      customersegment as customer_segment,
      ordercount as order_count,
      totalspent as total_spent,
      lastorderid as last_order_id,
      updatedat as updated_at,
      currency
    from landing.customer_sales
    {% else %}
    select
      customerid as customer_id,
      customername as customer_name,
      customeremail as customer_email,
      customersegment as customer_segment,
      cast(ordercount as bigint) as order_count,
      cast(null as double) as total_spent,
      lastorderid as last_order_id,
      updatedat as updated_at,
      currency
    from warehouse.landing.customer_sales
    {% endif %}
  stg_mdm_customer360.sql: |
    {% if target.type == 'postgres' %}
    select
      customer_id,
      customer_name,
      customer_email,
      customer_segment,
      currency,
      first_order_timestamp,
      last_order_timestamp,
      projected_order_count,
      projected_total_spent,
      projection_updated_at,
      updated_at
    from landing.mdm_customer360
    {% else %}
    select
      customer_id,
      customer_name,
      customer_email,
      customer_segment,
      currency,
      first_order_timestamp,
      last_order_timestamp,
      projected_order_count,
      projected_total_spent,
      projection_updated_at,
      updated_at
    from warehouse.landing.mdm_customer360
    {% endif %}
  stg_mdm_product_master.sql: |
    {% if target.type == 'postgres' %}
    select
      product_id,
      product_name,
      currency,
      first_seen_at,
      last_seen_at,
      orders_count,
      units_sold,
      avg_unit_price,
      updated_at
    from landing.mdm_product_master
    {% else %}
    select
      product_id,
      product_name,
      currency,
      first_seen_at,
      last_seen_at,
      orders_count,
      units_sold,
      avg_unit_price,
      updated_at
    from warehouse.landing.mdm_product_master
    {% endif %}
  stg_mdm_date.sql: |
    {% if target.type == 'postgres' %}
    select
      date_key,
      full_date,
      day_of_month,
      day_of_week,
      day_name,
      week_of_year,
      month_of_year,
      month_name,
      quarter_of_year,
      year_number,
      is_weekend,
      created_at,
      updated_at
    from landing.mdm_date
    {% else %}
    select
      date_key,
      full_date,
      day_of_month,
      day_of_week,
      day_name,
      week_of_year,
      month_of_year,
      month_name,
      quarter_of_year,
      year_number,
      is_weekend,
      created_at,
      updated_at
    from warehouse.landing.mdm_date
    {% endif %}
  dim_mdm_customer.sql: |
    select
      customer_id,
      customer_name,
      customer_email,
      customer_segment,
      currency,
      first_order_timestamp,
      last_order_timestamp,
      projected_order_count,
      projected_total_spent,
      projection_updated_at,
      updated_at
    from {{ "{{" }} ref('stg_mdm_customer360') {{ "}}" }}
  dim_mdm_product.sql: |
    select
      product_id,
      product_name,
      currency,
      first_seen_at,
      last_seen_at,
      orders_count,
      units_sold,
      avg_unit_price,
      updated_at
    from {{ "{{" }} ref('stg_mdm_product_master') {{ "}}" }}
  dim_mdm_date.sql: |
    select
      date_key,
      full_date as order_date,
      day_of_month,
      day_of_week,
      day_name,
      week_of_year,
      month_of_year,
      month_name,
      quarter_of_year,
      year_number,
      is_weekend,
      created_at,
      updated_at
    from {{ "{{" }} ref('stg_mdm_date') {{ "}}" }}
  fact_sales_order.sql: |
    with line_items as (
      select *
      from {{ "{{" }} ref('stg_sales_order_line_item') {{ "}}" }}
    ),
    orders as (
      select *
      from {{ "{{" }} ref('stg_sales_order') {{ "}}" }}
    ),
    dim_customer as (
      select *
      from {{ "{{" }} ref('dim_mdm_customer') {{ "}}" }}
    ),
    dim_product as (
      select *
      from {{ "{{" }} ref('dim_mdm_product') {{ "}}" }}
    ),
    dim_date as (
      select *
      from {{ "{{" }} ref('dim_mdm_date') {{ "}}" }}
    )
    select
      li.order_id,
      li.line_item_id,
      li.order_timestamp,
      cast(li.order_timestamp as date) as order_date,
      dd.date_key,
      li.customer_id,
      li.sku as product_id,
      coalesce(dp.product_name, li.product_name) as product_name,
      li.quantity,
      li.unit_price,
      li.line_total,
      o.order_total,
      o.line_item_count,
      coalesce(li.currency, o.currency, dc.currency, dp.currency) as currency,
      coalesce(dc.customer_name, o.customer_name) as customer_name,
      coalesce(dc.customer_email, o.customer_email) as customer_email,
      coalesce(dc.customer_segment, o.customer_segment) as customer_segment,
      dd.is_weekend
    from line_items li
    left join orders o
      on li.order_id = o.order_id
    left join dim_customer dc
      on li.customer_id = dc.customer_id
    left join dim_product dp
      on li.sku = dp.product_id
    left join dim_date dd
      on cast(li.order_timestamp as date) = dd.order_date
  fact_sales_order.yml: |
    version: 2
    models:
    - name: fact_sales_order
      description: "Line-level sales fact enriched with MDM customer, product, and date dimensions."
      columns:
      - name: order_id
        description: "Business order identifier."
        tests:
        - not_null
      - name: line_item_id
        description: "Unique line item identifier within an order."
        tests:
        - not_null
      - name: customer_id
        description: "Customer business key joined to the MDM customer dimension."
        tests:
        - not_null
        - relationships:
            config:
              severity: warn
              where: "customer_id like 'CUST-%'"
            arguments:
              to: ref('dim_mdm_customer')
              field: customer_id
      - name: product_id
        description: "Product business key joined to the MDM product dimension."
        tests:
        - not_null
        - relationships:
            arguments:
              to: ref('dim_mdm_product')
              field: product_id
      - name: date_key
        description: "Calendar key from the MDM date dimension."
        tests:
        - relationships:
            arguments:
              to: ref('dim_mdm_date')
              field: date_key
      - name: currency
        description: "Transaction currency code."
        tests:
        - not_null
        - accepted_values:
            arguments:
              values: ['USD']
      - name: is_weekend
        description: "True when the order date is on a weekend."
        tests:
        - accepted_values:
            arguments:
              values: [true, false]
              quote: false
  gold_customer_sales_summary.sql: |
    with sales as (
      select * from {{ "{{" }} ref('stg_customer_sales') {{ "}}" }}
    ),
    orders as (
      select * from {{ "{{" }} ref('stg_sales_order') {{ "}}" }}
    ),
    line_items as (
      select * from {{ "{{" }} ref('stg_sales_order_line_item') {{ "}}" }}
    ),
    line_item_rollup as (
      select
        customer_id,
        sum(line_total) as line_item_total,
        count(*) as total_line_items,
        max(order_timestamp) as last_line_item_at
      from line_items
      group by customer_id
    )
    select
      s.customer_id,
      max(s.customer_name) as customer_name,
      max(s.customer_email) as customer_email,
      max(s.customer_segment) as customer_segment,
      max(s.currency) as currency,
      max(s.order_count) as latest_order_count,
      max(s.total_spent) as latest_total_spent,
      coalesce(l.line_item_total, 0) as recomputed_total_from_line_items,
      coalesce(l.total_line_items, 0) as total_line_items,
      count(distinct o.order_id) as observed_orders,
      max(o.order_timestamp) as last_order_timestamp,
      max(s.updated_at) as projection_updated_at,
      max(l.last_line_item_at) as last_line_item_timestamp
    from sales s
    left join orders o
      on s.customer_id = o.customer_id
    left join line_item_rollup l
      on s.customer_id = l.customer_id
    group by s.customer_id, l.line_item_total, l.total_line_items
{{- end }}

{{- if .Values.minio.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: minio
data:
  init-minio.sh: |
    #!/usr/bin/env sh
    set -eu

    until mc alias set local http://{{ include "vision.serviceName" (dict "root" . "key" "minio") }}:9000 {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }} >/dev/null 2>&1; do
      echo "Waiting for MinIO to accept connections..."
      sleep 2
    done

    mc mb --ignore-existing local/{{ .Values.minio.bucket }}
    mc anonymous set private local/{{ .Values.minio.bucket }} >/dev/null 2>&1 || true

    echo "MinIO warehouse bucket ready: {{ .Values.minio.bucket }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-minio
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "minio") }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: {{ .Values.minio.service.apiPort }}
      targetPort: 9000
    - name: console
      port: {{ .Values.minio.service.consolePort }}
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vision.fullname" . }}-minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: minio-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: {{ .Values.minio.mcImage.repository }}:{{ .Values.minio.mcImage.tag }}
          imagePullPolicy: {{ .Values.minio.mcImage.pullPolicy }}
          command: ["/bin/sh", "/scripts/init-minio.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts/init-minio.sh
              subPath: init-minio.sh
      volumes:
        - name: script
          configMap:
            name: {{ include "vision.fullname" . }}-minio-init
            defaultMode: 0755
{{- end }}

{{- if .Values.postgres.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-snowflake-mimic
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: {{ include "vision.fullname" . }}-warehouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "snowflake-mimic") }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: postgres
spec:
  type: {{ .Values.postgres.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: 5432
{{- end }}

{{- if .Values.odsConnect.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-ods-connect-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: ods-connect
data:
  register-ods-connectors.sh: |
    #!/bin/sh

    set -eu
    (set -o pipefail >/dev/null 2>&1) && set -o pipefail

    CONNECT_URL="${CONNECT_URL:-http://{{ include "vision.serviceName" (dict "root" . "key" "ods-connect") }}:8083}"
    CONNECTORS_DIR="/connectors"
    CONNECTOR_FILES="s3-sales-order.json,s3-sales-order-line-item.json,s3-customer-sales.json,jdbc-sales-order-warehouse.json,jdbc-sales-order-line-item-warehouse.json,jdbc-customer-sales-warehouse.json"

    echo "Waiting for Kafka Connect at $CONNECT_URL ..."
    until curl -fsS "$CONNECT_URL/connector-plugins" >/dev/null; do
      sleep 2
    done

    if curl -fsS "$CONNECT_URL/connectors/jdbc-sales-warehouse" >/dev/null 2>&1; then
      echo "Deleting legacy connector jdbc-sales-warehouse"
      curl -fsS -X DELETE "$CONNECT_URL/connectors/jdbc-sales-warehouse" >/dev/null
    fi

    for legacy in iceberg-sales-order iceberg-sales-order-line-item iceberg-customer-sales; do
      if curl -fsS "$CONNECT_URL/connectors/$legacy" >/dev/null 2>&1; then
        echo "Deleting legacy connector: $legacy"
        curl -fsS -X DELETE "$CONNECT_URL/connectors/$legacy" >/dev/null
      fi
    done

    OLD_IFS="$IFS"
    IFS=','
    set -- $CONNECTOR_FILES
    IFS="$OLD_IFS"

    for file_name in "$@"; do
      config="$CONNECTORS_DIR/$file_name"
      if [ -f "$config" ]; then
        name=$(jq -r '.name // empty' "$config")
        if [ -z "$name" ] || [ "$name" = "null" ]; then
          name="${file_name%.json}"
        fi
        payload=$(jq -c '.config // .' "$config")
        echo "Registering connector: $name"
        curl -fsS -X PUT -H "Content-Type: application/json" \
          --data "$payload" \
          "$CONNECT_URL/connectors/$name/config"
      fi
    done
  s3-sales-order.json: |
    {
      "connector.class": "io.confluent.connect.s3.S3SinkConnector",
      "tasks.max": "1",
      "topics": "sales_order",
      "value.converter": "io.confluent.connect.avro.AvroConverter",
      "value.converter.schema.registry.url": "http://{{ include "vision.serviceName" (dict "root" . "key" "schema-registry") }}:8081",
      "s3.bucket.name": "{{ .Values.minio.bucket }}",
      "topics.dir": "raw/ods",
      "store.url": "http://{{ include "vision.serviceName" (dict "root" . "key" "minio") }}:9000",
      "s3.region": "us-east-1",
      "aws.access.key.id": "{{ .Values.minio.rootUser }}",
      "aws.secret.access.key": "{{ .Values.minio.rootPassword }}",
      "s3.part.size": "5242880",
      "flush.size": "1",
