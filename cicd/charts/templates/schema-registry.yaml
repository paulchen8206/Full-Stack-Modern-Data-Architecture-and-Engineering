{{- if .Values.schemaRegistry.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-schema-registry
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: schema-registry
spec:
  replicas: {{ .Values.schemaRegistry.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: schema-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: schema-registry
    spec:
      enableServiceLinks: false
      containers:
        - name: schema-registry
          image: {{ .Values.schemaRegistry.image.repository }}:{{ .Values.schemaRegistry.image.tag }}
          imagePullPolicy: {{ .Values.schemaRegistry.image.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: {{ printf "PLAINTEXT://%s:9092" (include "vision.serviceName" (dict "root" . "key" "kafka")) | quote }}
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: {{ include "vision.serviceName" (dict "root" . "key" "schema-registry") | quote }}
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "schema-registry") }}
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: schema-registry
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: schema-registry
{{- end }}
