{{- if .Values.mdm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-mdm-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS mdm;

    USE mdm;

    CREATE TABLE IF NOT EXISTS customer360 (
      customer_id VARCHAR(64) PRIMARY KEY,
      customer_name VARCHAR(255) NOT NULL,
      customer_email VARCHAR(255) NOT NULL,
      customer_segment VARCHAR(64) NOT NULL,
      currency VARCHAR(8) NOT NULL DEFAULT 'USD',
      first_order_timestamp DATETIME NULL,
      last_order_timestamp DATETIME NULL,
      projected_order_count INT NOT NULL DEFAULT 0,
      projected_total_spent DECIMAL(18,2) NOT NULL DEFAULT 0.00,
      projection_updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS product_master (
      product_id VARCHAR(64) PRIMARY KEY,
      product_name VARCHAR(255) NOT NULL,
      currency VARCHAR(8) NOT NULL DEFAULT 'USD',
      first_seen_at DATETIME NULL,
      last_seen_at DATETIME NULL,
      orders_count INT NOT NULL DEFAULT 0,
      units_sold INT NOT NULL DEFAULT 0,
      avg_unit_price DECIMAL(18,2) NOT NULL DEFAULT 0.00,
      updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS `date` (
      date_key INT PRIMARY KEY,
      full_date DATE NOT NULL,
      day_of_month TINYINT NOT NULL,
      day_of_week TINYINT NOT NULL,
      day_name VARCHAR(16) NOT NULL,
      week_of_year TINYINT NOT NULL,
      month_of_year TINYINT NOT NULL,
      month_name VARCHAR(16) NOT NULL,
      quarter_of_year TINYINT NOT NULL,
      year_number SMALLINT NOT NULL,
      is_weekend BOOLEAN NOT NULL,
      created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      UNIQUE KEY uq_date_full_date (full_date)
    );

    INSERT IGNORE INTO customer360 (
      customer_id,
      customer_name,
      customer_email,
      customer_segment,
      currency,
      first_order_timestamp,
  dbz-mysql-mdm.json: |
    {
      "connector.class": "io.debezium.connector.mysql.MySqlConnector",
      "tasks.max": "1",
      "database.hostname": "{{ include "vision.serviceName" (dict "root" . "key" "mdm-source") }}",
      "database.port": "3306",
      "database.user": "root",
      "database.password": "{{ .Values.mdm.mysql.rootPassword }}",
      "database.server.id": "5401",
      "topic.prefix": "mdm_mysql",
      "database.include.list": "{{ .Values.mdm.mysql.database }}",
      "table.include.list": "{{ .Values.mdm.mysql.database }}.customer360,{{ .Values.mdm.mysql.database }}.product_master",
      "include.schema.changes": "false",
      "snapshot.mode": "initial",
      "decimal.handling.mode": "string",
      "time.precision.mode": "connect",
      "schema.history.internal": "io.debezium.storage.file.history.FileSchemaHistory",
      "schema.history.internal.file.filename": "/tmp/debezium-mdm-schemahistory.dat"
    }
  register-mdm-connectors.sh: |
    #!/bin/sh

    set -eu
    (set -o pipefail >/dev/null 2>&1) && set -o pipefail

    CONNECT_URL="${CONNECT_URL:-http://{{ include "vision.serviceName" (dict "root" . "key" "mdm-connect") }}:8083}"
    CONNECTORS_DIR="/connectors"
    CONNECTOR_FILES="s3-mdm-customer.json,s3-mdm-product.json,s3-mdm-date.json,jdbc-mdm-warehouse.json"

    echo "Waiting for Kafka Connect at $CONNECT_URL ..."
    until curl -fsS "$CONNECT_URL/connector-plugins" >/dev/null; do
      sleep 2
    done

    OLD_IFS="$IFS"
    IFS=','
    set -- $CONNECTOR_FILES
    IFS="$OLD_IFS"

    for file_name in "$@"; do
      config="$CONNECTORS_DIR/$file_name"
      if [ -f "$config" ]; then
        name=$(jq -r '.name // empty' "$config")
        if [ -z "$name" ] || [ "$name" = "null" ]; then
          name="${file_name%.json}"
        fi
        payload=$(jq -c '.config // .' "$config")
        echo "Registering connector: $name"
        curl -fsS -X PUT -H "Content-Type: application/json" \
          --data "$payload" \
          "$CONNECT_URL/connectors/$name/config"
      fi
    done
  s3-mdm-customer.json: |
    {
      "name": "s3-mdm-customer",
      "config": {
        "connector.class": "io.confluent.connect.s3.S3SinkConnector",
        "tasks.max": "1",
        "topics": "mdm_customer",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter.schemas.enable": "false",
        "s3.bucket.name": "{{ .Values.minio.bucket }}",
        "topics.dir": "raw/mdm",
        "store.url": "http://{{ include "vision.serviceName" (dict "root" . "key" "minio") }}:{{ .Values.minio.service.apiPort }}",
        "s3.region": "us-east-1",
        "aws.access.key.id": "{{ .Values.minio.rootUser }}",
        "aws.secret.access.key": "{{ .Values.minio.rootPassword }}",
        "s3.part.size": "5242880",
        "flush.size": "1",
        "storage.class": "io.confluent.connect.s3.storage.S3Storage",
        "format.class": "io.confluent.connect.s3.format.json.JsonFormat",
        "partitioner.class": "io.confluent.connect.storage.partitioner.DefaultPartitioner",
        "schema.compatibility": "NONE"
      }
    }
  s3-mdm-product.json: |
    {
      "name": "s3-mdm-product",
      "config": {
        "connector.class": "io.confluent.connect.s3.S3SinkConnector",
        "tasks.max": "1",
        "topics": "mdm_product",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter.schemas.enable": "false",
        "s3.bucket.name": "{{ .Values.minio.bucket }}",
        "topics.dir": "raw/mdm",
        "store.url": "http://{{ include "vision.serviceName" (dict "root" . "key" "minio") }}:{{ .Values.minio.service.apiPort }}",
        "s3.region": "us-east-1",
        "aws.access.key.id": "{{ .Values.minio.rootUser }}",
        "aws.secret.access.key": "{{ .Values.minio.rootPassword }}",
        "s3.part.size": "5242880",
        "flush.size": "1",
        "storage.class": "io.confluent.connect.s3.storage.S3Storage",
        "format.class": "io.confluent.connect.s3.format.json.JsonFormat",
        "partitioner.class": "io.confluent.connect.storage.partitioner.DefaultPartitioner",
        "schema.compatibility": "NONE"
      }
    }
  s3-mdm-date.json: |
    {
      "name": "s3-mdm-date",
      "config": {
        "connector.class": "io.confluent.connect.s3.S3SinkConnector",
        "tasks.max": "1",
        "topics": "mdm_date",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter.schemas.enable": "false",
        "s3.bucket.name": "{{ .Values.minio.bucket }}",
        "topics.dir": "raw/mdm",
        "store.url": "http://{{ include "vision.serviceName" (dict "root" . "key" "minio") }}:{{ .Values.minio.service.apiPort }}",
        "s3.region": "us-east-1",
        "aws.access.key.id": "{{ .Values.minio.rootUser }}",
        "aws.secret.access.key": "{{ .Values.minio.rootPassword }}",
        "s3.part.size": "5242880",
        "flush.size": "1",
        "storage.class": "io.confluent.connect.s3.storage.S3Storage",
        "format.class": "io.confluent.connect.s3.format.json.JsonFormat",
        "partitioner.class": "io.confluent.connect.storage.partitioner.DefaultPartitioner",
        "schema.compatibility": "NONE"
      }
    }
  jdbc-mdm-warehouse.json: |
    {
      "name": "jdbc-mdm-warehouse",
      "config": {
        "connector.class": "io.confluent.connect.jdbc.JdbcSinkConnector",
        "tasks.max": "1",
        "topics": "mdm_customer_jdbc,mdm_product_jdbc,mdm_date_jdbc",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter.schemas.enable": "true",
        "connection.url": "jdbc:postgresql://{{ include "vision.serviceName" (dict "root" . "key" "snowflake-mimic") }}:5432/{{ .Values.postgres.auth.database }}",
        "connection.user": "{{ .Values.postgres.auth.user }}",
        "connection.password": "{{ .Values.postgres.auth.password }}",
        "table.name.format": "landing.${topic}",
        "transforms": "RouteTopic",
        "transforms.RouteTopic.type": "org.apache.kafka.connect.transforms.RegexRouter",
        "transforms.RouteTopic.regex": "(.*)_jdbc",
        "transforms.RouteTopic.replacement": "$1",
        "insert.mode": "insert",
        "auto.create": "true",
        "auto.evolve": "true",
        "batch.size": "3000",
        "delete.enabled": "false",
        "pk.mode": "none",
        "errors.tolerance": "all",
        "errors.log.enable": "true",
        "errors.log.include.messages": "true",
        "consumer.override.auto.offset.reset": "latest",
        "quote.sql.identifiers": "never"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-mdm-source
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mysql-mdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: mysql-mdm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: mysql-mdm
    spec:
      containers:
        - name: mysql-mdm
          image: {{ .Values.mdm.source.image.repository }}:{{ .Values.mdm.source.image.tag }}
          imagePullPolicy: {{ .Values.mdm.source.image.pullPolicy }}
          args:
            - --server-id={{ .Values.mdm.mysql.serverId }}
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --binlog-row-image=FULL
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mdm.mysql.rootPassword | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mdm.mysql.database | quote }}
            - name: MDM_SOURCE_INTERVAL_SEC
              value: {{ .Values.mdm.source.intervalSec | quote }}
            - name: MDM_INSERT_NEW_KEY_PROB
              value: {{ .Values.mdm.source.insertNewKeyProb | quote }}
            - name: MDM_APP_MYSQL_USER
              value: {{ .Values.mdm.source.appMysqlUser | quote }}
            - name: MDM_APP_MYSQL_PASSWORD
              value: {{ .Values.mdm.source.appMysqlPassword | quote }}
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: {{ include "vision.fullname" . }}-mdm-config
            items:
              - key: init.sql
                path: init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "mdm-source") }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mysql-mdm
spec:
  type: {{ .Values.mdm.mysql.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mysql-mdm
  ports:
    - name: mysql
      port: {{ .Values.mdm.mysql.service.port }}
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-mdm-connect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm-connect
spec:
  replicas: {{ .Values.mdm.connect.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: mdm-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: mdm-connect
    spec:
      containers:
        - name: mdm-connect
          image: {{ .Values.mdm.connect.image.repository }}:{{ .Values.mdm.connect.image.tag }}
          imagePullPolicy: {{ .Values.mdm.connect.image.pullPolicy }}
          ports:
            - containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ tpl .Values.kafkaBootstrapServers . | quote }}
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: {{ include "vision.serviceName" (dict "root" . "key" "mdm-connect") | quote }}
            - name: CONNECT_GROUP_ID
              value: {{ .Values.mdm.connect.groupId | quote }}
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: {{ .Values.mdm.connect.configStorageTopic | quote }}
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: {{ .Values.mdm.connect.offsetStorageTopic | quote }}
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: {{ .Values.mdm.connect.statusStorageTopic | quote }}
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_INTERNAL_KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_INTERNAL_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_LOG4J_ROOT_LOGLEVEL
              value: INFO
            - name: CONNECT_PLUGIN_PATH
              value: /usr/share/confluent-hub-components,/usr/share/java
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "mdm-connect") }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm-connect
spec:
  type: {{ .Values.mdm.connect.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm-connect
  ports:
    - name: http
      port: {{ .Values.mdm.connect.service.port }}
      targetPort: 8083
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vision.fullname" . }}-mdm-connect-init
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm-connect-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: mdm-connect-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mdm-connect-init
          image: {{ .Values.mdm.connect.curlImage.repository }}:{{ .Values.mdm.connect.curlImage.tag }}
          imagePullPolicy: {{ .Values.mdm.connect.curlImage.pullPolicy }}
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c", "apk add --no-cache jq curl && sh /scripts/register-mdm-connectors.sh"]
          volumeMounts:
            - name: mdm-config
              mountPath: /scripts/register-mdm-connectors.sh
              subPath: register-mdm-connectors.sh
            - name: connector-configs
              mountPath: /connectors
      volumes:
        - name: mdm-config
          configMap:
            name: {{ include "vision.fullname" . }}-mdm-config
            defaultMode: 0755
            items:
              - key: register-mdm-connectors.sh
                path: register-mdm-connectors.sh
        - name: connector-configs
          configMap:
            name: {{ include "vision.fullname" . }}-mdm-config
            items:
              - key: s3-mdm-customer.json
                path: s3-mdm-customer.json
              - key: s3-mdm-product.json
                path: s3-mdm-product.json
              - key: s3-mdm-date.json
                path: s3-mdm-date.json
              - key: jdbc-mdm-warehouse.json
                path: jdbc-mdm-warehouse.json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-mdm-cdc-curate
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm-cdc-curate
spec:
  replicas: {{ .Values.mdm.cdcProducer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: mdm-cdc-curate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: mdm-cdc-curate
    spec:
      initContainers:
        - name: wait-for-kafka
          image: {{ .Values.mdm.waitImage.repository }}:{{ .Values.mdm.waitImage.tag }}
          imagePullPolicy: {{ .Values.mdm.waitImage.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              until nc -z {{ include "vision.serviceName" (dict "root" . "key" "kafka") }} 9092; do
                echo "Waiting for Kafka broker..."
                sleep 2
              done
      containers:
        - name: mdm-cdc-curate
          image: {{ .Values.mdm.cdcProducer.image.repository }}:{{ .Values.mdm.cdcProducer.image.tag }}
          imagePullPolicy: {{ .Values.mdm.cdcProducer.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ tpl .Values.kafkaBootstrapServers . | quote }}
            - name: MDM_CDC_GROUP_ID
              value: {{ .Values.mdm.cdcProducer.groupId | quote }}
            - name: CDC_CONSUMER_OFFSET_RESET
              value: {{ .Values.mdm.cdcProducer.offsetReset | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-mdm-rds-pg
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: mdm-pyspark-sync
spec:
  replicas: {{ .Values.mdm.pysparkSync.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: mdm-pyspark-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: mdm-pyspark-sync
    spec:
      containers:
        - name: mdm-rds-pg
          image: {{ .Values.mdm.pysparkSync.image.repository }}:{{ .Values.mdm.pysparkSync.image.tag }}
          imagePullPolicy: {{ .Values.mdm.pysparkSync.image.pullPolicy }}
          command:
            - /opt/spark/bin/spark-submit
            - --conf
            - spark.jars.ivy=/tmp/.ivy
            - --packages
            - org.postgresql:postgresql:42.7.4,com.mysql:mysql-connector-j:8.4.0
            - /app/main.py
          env:
            - name: MDM_MYSQL_HOST
              value: {{ include "vision.serviceName" (dict "root" . "key" "mdm-source") | quote }}
            - name: MDM_MYSQL_PORT
              value: {{ .Values.mdm.mysql.service.port | quote }}
            - name: MDM_MYSQL_DB
              value: {{ .Values.mdm.mysql.database | quote }}
            - name: MDM_MYSQL_USER
              value: root
            - name: MDM_MYSQL_PASSWORD
              value: {{ .Values.mdm.mysql.rootPassword | quote }}
            - name: POSTGRES_HOST
              value: {{ include "vision.serviceName" (dict "root" . "key" "snowflake-mimic") | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
            - name: MDM_SYNC_INTERVAL_SEC
              value: {{ .Values.mdm.pysparkSync.syncIntervalSec | quote }}
{{- end }}
