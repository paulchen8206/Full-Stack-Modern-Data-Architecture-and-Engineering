nameOverride: ""
fullnameOverride: ""
producer:
  enabled: true
  replicas: 1
  image:
    repository: realtime-sales-producer
    tag: 0.1.0
    pullPolicy: IfNotPresent
  intervalMs: 1500
  rawTopic: raw_sales_orders
processor:
  enabled: true
  replicas: 1
  image:
    repository: realtime-sales-processor
    tag: 0.1.0
    pullPolicy: IfNotPresent
  topics:
    rawSalesOrders: raw_sales_orders
    salesOrder: sales_order
    salesOrderLineItem: sales_order_line_item
    customerSales: customer_sales
  consumerGroupId: realtime-flink-processor
  checkpointIntervalMs: 10000
kafkaUi:
  enabled: false
  replicas: 1
  image:
    repository: provectuslabs/kafka-ui
    tag: v0.7.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
  rootUser: minio
  rootPassword: minio123
  bucket: warehouse
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    user: analytics
    password: analytics
    database: analytics
  service:
    type: ClusterIP
    port: 5432
connect:
  enabled: false
  image:
    repository: realtime-sales-connect
    tag: 0.1.0
    pullPolicy: IfNotPresent
  curlImage:
    repository: curlimages/curl
    tag: 8.12.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
  groupId: connect-cluster-1
  configStorageTopic: connect-configs
  offsetStorageTopic: connect-offsets
  statusStorageTopic: connect-status
dbt:
  enabled: false
  image:
    repository: realtime-sales-dbt
    tag: 0.1.0
    pullPolicy: IfNotPresent
airflow:
  enabled: false
  image:
    repository: realtime-sales-airflow
    tag: 0.1.0
    pullPolicy: IfNotPresent
  adminUsername: admin
  adminPassword: admin
  service:
    type: ClusterIP
    port: 8080
observability:
  enabled: false
  prometheus:
    replicas: 1
    image:
      repository: prom/prometheus
      tag: v2.53.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9090
  loki:
    replicas: 1
    image:
      repository: grafana/loki
      tag: 2.9.8
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3100
  promtail:
    enabled: true
    image:
      repository: grafana/promtail
      tag: 2.9.8
      pullPolicy: IfNotPresent
  grafana:
    replicas: 1
    image:
      repository: grafana/grafana
      tag: 11.1.0
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    service:
      type: ClusterIP
      port: 3000
kafkaBootstrapServers: kafka:9092
kafka:
  enabled: false
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
    replicaCount: 1
  broker:
    replicaCount: 1
  kraft:
    enabled: true
  provisioning:
    enabled: true
    numPartitions: 3
    replicationFactor: 1
    topics:
    - name: raw_sales_orders
      partitions: 3
      replicationFactor: 1
    - name: sales_order
      partitions: 3
      replicationFactor: 1
    - name: sales_order_line_item
      partitions: 3
      replicationFactor: 1
    - name: customer_sales
      partitions: 3
      replicationFactor: 1
    - name: connect-configs
      partitions: 1
      replicationFactor: 1
    - name: connect-offsets
      partitions: 6
      replicationFactor: 1
    - name: connect-status
      partitions: 3
      replicationFactor: 1
    - name: connect-iceberg-control
      partitions: 3
      replicationFactor: 1