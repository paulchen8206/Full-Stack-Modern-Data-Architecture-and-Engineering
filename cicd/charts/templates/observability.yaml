    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: blackbox-exporter
  ports:
    - name: http
      port: {{ .Values.observability.blackboxExporter.service.port }}
      targetPort: 9115
