apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-ods-connect
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: ods-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: ods-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: ods-connect
    spec:
      containers:
        - name: ods-connect
          image: {{ .Values.odsConnect.image.repository }}:{{ .Values.odsConnect.image.tag }}
          imagePullPolicy: {{ .Values.odsConnect.image.pullPolicy }}
          ports:
            - containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ tpl .Values.kafkaBootstrapServers . | quote }}
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: {{ include "vision.serviceName" (dict "root" . "key" "ods-connect") | quote }}
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_GROUP_ID
              value: {{ .Values.odsConnect.groupId | quote }}
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: {{ .Values.odsConnect.configStorageTopic | quote }}
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: {{ .Values.odsConnect.offsetStorageTopic | quote }}
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: {{ .Values.odsConnect.statusStorageTopic | quote }}
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_INTERNAL_KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_INTERNAL_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_PLUGIN_PATH
              value: /usr/share/java,/usr/share/confluent-hub-components
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "ods-connect") }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: ods-connect
spec:
  type: {{ .Values.odsConnect.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: ods-connect
  ports:
    - name: http
      port: {{ .Values.odsConnect.service.port }}
      targetPort: 8083
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vision.fullname" . }}-ods-connect-init
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: ods-connect-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: ods-connect-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ods-connect-init
          image: {{ .Values.odsConnect.curlImage.repository }}:{{ .Values.odsConnect.curlImage.tag }}
          imagePullPolicy: {{ .Values.odsConnect.curlImage.pullPolicy }}
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c", "apk add --no-cache jq curl && sh /scripts/register-ods-connectors.sh"]
          volumeMounts:
            - name: ods-connect-config
              mountPath: /scripts/register-ods-connectors.sh
              subPath: register-ods-connectors.sh
            - name: connector-configs
              mountPath: /connectors
      volumes:
        - name: ods-connect-config
          configMap:
            name: {{ include "vision.fullname" . }}-ods-connect-config
            defaultMode: 0755
            items:
              - key: register-ods-connectors.sh
                path: register-ods-connectors.sh
        - name: connector-configs
          configMap:
            name: {{ include "vision.fullname" . }}-ods-connect-config
            items:
              - key: s3-sales-order.json
                path: s3-sales-order.json
              - key: s3-sales-order-line-item.json
                path: s3-sales-order-line-item.json
              - key: s3-customer-sales.json
                path: s3-customer-sales.json
              - key: jdbc-sales-order-warehouse.json
                path: jdbc-sales-order-warehouse.json
              - key: jdbc-sales-order-line-item-warehouse.json
                path: jdbc-sales-order-line-item-warehouse.json
              - key: jdbc-customer-sales-warehouse.json
                path: jdbc-customer-sales-warehouse.json
{{- end }}

