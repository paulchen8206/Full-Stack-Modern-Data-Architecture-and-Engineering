    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
spec:
  type: {{ .Values.observability.loki.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
  ports:
    - name: http
      port: {{ .Values.observability.loki.service.port }}
      targetPort: 3100
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "grafana") }}
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
spec:
  type: {{ .Values.observability.grafana.service.type }}
