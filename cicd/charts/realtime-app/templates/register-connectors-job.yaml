apiVersion: batch/v1
kind: Job
metadata:
  name: register-ods-connectors
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register-connectors
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache bash curl
              NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              CONNECT_DEPLOYMENT="realtime-dev-realtime-app-ods-connect"
              wait_for_connect() {
                until kubectl exec -n $NAMESPACE deploy/$CONNECT_DEPLOYMENT -- curl -sf http://localhost:8083/connectors >/dev/null; do
                  echo "Waiting for Kafka Connect REST API..."
                  sleep 3
                done
              }
              wait_for_connect
              for cfg in /configs/*.json; do
                name=$(basename "$cfg" .json)
                echo "Registering $name from $cfg"
                kubectl cp "$cfg" $NAMESPACE/$(kubectl get pod -n $NAMESPACE -l app.kubernetes.io/component=ods-connect -o jsonpath='{.items[0].metadata.name}'):/tmp/$name.json
                kubectl exec -n $NAMESPACE deploy/$CONNECT_DEPLOYMENT -- curl -X POST -H "Content-Type: application/json" --data @/tmp/$name.json http://localhost:8083/connectors || echo "WARN: Could not register $name"
              done
          volumeMounts:
            - name: connector-configs
              mountPath: /configs
      volumes:
        - name: connector-configs
          configMap:
            name: connector-configs
