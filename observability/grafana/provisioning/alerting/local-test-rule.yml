apiVersion: 1
groups:
- orgId: 1
  name: local-test-rules
  folder: Local
  interval: 1m
  rules:
  - uid: local_test_rule_presence
    title: Local Test Rule Presence
    condition: C
    data:
    - refId: A
      datasourceUid: prometheus
      relativeTimeRange:
        from: 300
        to: 0
      model:
        editorMode: code
        expr: vector(0)
        instant: true
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
        range: false
        refId: A
    - refId: B
      datasourceUid: __expr__
      relativeTimeRange:
        from: 0
        to: 0
      model:
        type: reduce
        expression: A
        reducer: last
        conditions:
        - evaluator:
            params: []
            type: gt
          operator:
            type: and
          query:
            params:
            - B
          reducer:
            params: []
            type: last
          type: query
        intervalMs: 1000
        maxDataPoints: 43200
        refId: B
    - refId: C
      datasourceUid: __expr__
      relativeTimeRange:
        from: 0
        to: 0
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            params:
            - 0.5
            type: gt
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            params: []
            type: last
          type: query
        intervalMs: 1000
        maxDataPoints: 43200
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 0s
    annotations:
      summary: Local Grafana-managed test rule to keep /alerting populated.
    labels:
      severity: info
      source: grafana-local
    isPaused: false