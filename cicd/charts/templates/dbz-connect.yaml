{{- if .Values.dbzConnect.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-dbz-connect-config
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: dbz-connect
data:
  register-dbz-connectors.sh: |
    #!/bin/sh

    set -eu
    (set -o pipefail >/dev/null 2>&1) && set -o pipefail

    CONNECT_URL="${CONNECT_URL:-http://{{ include "vision.serviceName" (dict "root" . "key" "dbz-connect") }}:8083}"
    CONNECTORS_DIR="/connectors"
    CONNECTOR_FILES="dbz-mysql-mdm.json"
    CONNECT_WAIT_SECONDS="${CONNECT_WAIT_SECONDS:-180}"

    echo "Waiting for Kafka Connect at $CONNECT_URL ..."
    start_ts=$(date +%s)
    attempt=0
    until curl -sS -f --connect-timeout 2 "$CONNECT_URL/connector-plugins" >/dev/null 2>&1; do
      now_ts=$(date +%s)
      elapsed=$((now_ts - start_ts))
      attempt=$((attempt + 1))

      if [ "$elapsed" -ge "$CONNECT_WAIT_SECONDS" ]; then
        echo "Timed out after ${CONNECT_WAIT_SECONDS}s waiting for Kafka Connect at $CONNECT_URL"
        exit 1
      fi

      if [ $((attempt % 10)) -eq 0 ]; then
        echo "Still waiting for Kafka Connect (${elapsed}s elapsed)..."
      fi

      sleep 2
    done
    echo "Kafka Connect is reachable at $CONNECT_URL"

    OLD_IFS="$IFS"
    IFS=','
    set -- $CONNECTOR_FILES
    IFS="$OLD_IFS"

    for file_name in "$@"; do
      config="$CONNECTORS_DIR/$file_name"
      if [ -f "$config" ]; then
        name=$(jq -r '.name // empty' "$config")
        if [ -z "$name" ] || [ "$name" = "null" ]; then
          name="${file_name%.json}"
        fi
        payload=$(jq -c '.config // .' "$config")
        echo "Registering connector: $name"

        attempt=1
        max_attempts=5
        while [ "$attempt" -le "$max_attempts" ]; do
          tmp_body="/tmp/${name}-register-response.json"
          http_code=$(curl -sS -o "$tmp_body" -w "%{http_code}" \
            -X PUT -H "Content-Type: application/json" \
            --data "$payload" \
            "$CONNECT_URL/connectors/$name/config" || true)

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Connector registered: $name (HTTP $http_code)"
            break
          fi

          echo "Connector registration failed for $name (attempt $attempt/$max_attempts, HTTP $http_code)"
          [ -f "$tmp_body" ] && cat "$tmp_body"

          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "Giving up registering connector: $name"
            exit 1
          fi

          attempt=$((attempt + 1))
          sleep 3
        done
      fi
    done
  dbz-mysql-mdm.json: |
    {
      "connector.class": "io.debezium.connector.mysql.MySqlConnector",
      "tasks.max": "1",
      "database.hostname": "{{ include "vision.serviceName" (dict "root" . "key" "mdm-source") }}",
      "database.port": "3306",
      "database.user": "root",
      "database.password": "{{ .Values.mdm.mysql.rootPassword }}",
      "database.server.id": "5401",
      "topic.prefix": "mdm_mysql",
      "database.include.list": "{{ .Values.mdm.mysql.database }}",
      "table.include.list": "{{ .Values.mdm.mysql.database }}.customer360,{{ .Values.mdm.mysql.database }}.product_master,{{ .Values.mdm.mysql.database }}.date",
      "include.schema.changes": "false",
      "snapshot.mode": "initial",
      "decimal.handling.mode": "string",
      "time.precision.mode": "connect",
      "schema.history.internal": "io.debezium.storage.kafka.history.KafkaSchemaHistory",
      "schema.history.internal.kafka.bootstrap.servers": "{{ tpl .Values.kafkaBootstrapServers . }}",
      "schema.history.internal.kafka.topic": "schema-changes.mdm"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-dbz-connect
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: dbz-connect
spec:
  replicas: {{ .Values.dbzConnect.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: dbz-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: dbz-connect
    spec:
      containers:
        - name: dbz-connect
          image: {{ .Values.dbzConnect.image.repository }}:{{ .Values.dbzConnect.image.tag }}
          imagePullPolicy: {{ .Values.dbzConnect.image.pullPolicy }}
          ports:
            - containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ tpl .Values.kafkaBootstrapServers . | quote }}
            - name: CONNECT_GROUP_ID
              value: {{ .Values.dbzConnect.groupId | quote }}
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: {{ .Values.dbzConnect.configStorageTopic | quote }}
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: {{ .Values.dbzConnect.offsetStorageTopic | quote }}
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: {{ .Values.dbzConnect.statusStorageTopic | quote }}
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_INTERNAL_KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_INTERNAL_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: {{ include "vision.serviceName" (dict "root" . "key" "dbz-connect") | quote }}
            - name: CONNECT_PLUGIN_PATH
              value: /kafka/connect,/kafka/connect-plugins,/usr/share/java,/usr/share/confluent-hub-components
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "dbz-connect") }}
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: dbz-connect
spec:
  type: {{ .Values.dbzConnect.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: dbz-connect
  ports:
    - name: http
      port: {{ .Values.dbzConnect.service.port }}
      targetPort: 8083
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vision.fullname" . }}-dbz-connect-init
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: dbz-connect-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: dbz-connect-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: dbz-connect-init
          image: {{ .Values.dbzConnect.curlImage.repository }}:{{ .Values.dbzConnect.curlImage.tag }}
          imagePullPolicy: {{ .Values.dbzConnect.curlImage.pullPolicy }}
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c", "apk add --no-cache jq curl && sh /scripts/register-dbz-connectors.sh"]
          volumeMounts:
            - name: dbz-config
              mountPath: /scripts/register-dbz-connectors.sh
              subPath: register-dbz-connectors.sh
            - name: connector-configs
              mountPath: /connectors
      volumes:
        - name: dbz-config
          configMap:
            name: {{ include "vision.fullname" . }}-dbz-connect-config
            defaultMode: 0755
            items:
              - key: register-dbz-connectors.sh
                path: register-dbz-connectors.sh
        - name: connector-configs
          configMap:
            name: {{ include "vision.fullname" . }}-dbz-connect-config
            items:
              - key: dbz-mysql-mdm.json
                path: dbz-mysql-mdm.json
{{- end }}

{{- if .Values.conduktor.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-conduktor-db
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: conduktor-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: conduktor-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: conduktor-db
    spec:
      containers:
        - name: conduktor-db
          image: {{ .Values.conduktor.db.image.repository }}:{{ .Values.conduktor.db.image.tag }}
          imagePullPolicy: {{ .Values.conduktor.db.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.conduktor.db.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.conduktor.db.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.conduktor.db.auth.password | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "conduktor-db") }}
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: conduktor-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: conduktor-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-conduktor
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: conduktor
spec:
  replicas: {{ .Values.conduktor.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: conduktor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: conduktor
    spec:
      containers:
        - name: conduktor
          image: {{ .Values.conduktor.image.repository }}:{{ .Values.conduktor.image.tag }}
          imagePullPolicy: {{ .Values.conduktor.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: CDK_ORGANIZATION_NAME
              value: {{ .Values.conduktor.organizationName | quote }}
            - name: CDK_ADMIN_EMAIL
              value: {{ .Values.conduktor.adminEmail | quote }}
            - name: CDK_ADMIN_PASSWORD
              value: {{ .Values.conduktor.adminPassword | quote }}
            - name: CDK_KAFKA_BROKERS
              value: {{ tpl .Values.kafkaBootstrapServers . | quote }}
            - name: CDK_DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s:5432/%s" .Values.conduktor.db.auth.user .Values.conduktor.db.auth.password (include "vision.serviceName" (dict "root" . "key" "conduktor-db")) .Values.conduktor.db.auth.database | quote }}
            - name: CDK_DATABASE_USERNAME
              value: {{ .Values.conduktor.db.auth.user | quote }}
            - name: CDK_DATABASE_PASSWORD
              value: {{ .Values.conduktor.db.auth.password | quote }}
            - name: CDK_CLUSTERS_0_ID
              value: local-kafka
            - name: CDK_CLUSTERS_0_NAME
              value: local-kafka
            - name: CDK_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ tpl .Values.kafkaBootstrapServers . | quote }}
            - name: CDK_CLUSTERS_0_SCHEMAREGISTRY_ID
              value: confluent-sr
            - name: CDK_CLUSTERS_0_SCHEMAREGISTRY_URL
              value: {{ printf "http://%s:8081" (include "vision.serviceName" (dict "root" . "key" "schema-registry")) | quote }}
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_0_ID
              value: mdm-connect
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_0_NAME
              value: MDM Kafka Connect
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_0_URL
              value: {{ printf "http://%s:8083" (include "vision.serviceName" (dict "root" . "key" "mdm-connect")) | quote }}
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_1_ID
              value: dbz-connect
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_1_NAME
              value: Debezium Kafka Connect
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_1_URL
              value: {{ printf "http://%s:8083" (include "vision.serviceName" (dict "root" . "key" "dbz-connect")) | quote }}
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_2_ID
              value: ods-connect
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_2_NAME
              value: ODS Kafka Connect
            - name: CDK_CLUSTERS_0_KAFKACONNECTS_2_URL
              value: {{ printf "http://%s:8083" (include "vision.serviceName" (dict "root" . "key" "ods-connect")) | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "conduktor") }}
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: conduktor
spec:
  type: {{ .Values.conduktor.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: conduktor
  ports:
    - name: http
      port: {{ .Values.conduktor.service.port }}
      targetPort: 8080
{{- end }}