services:
  minio:
    container_name: minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    container_name: minio_init
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: [ "/bin/sh", "/scripts/init-minio.sh" ]
    volumes:
      - ./platform-services/minio/init-minio.sh:/scripts/init-minio.sh:ro

  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.6.1
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-1
    hostname: kafka-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: LISTENER_INTERNAL://kafka-1:19092,LISTENER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_INTERNAL:PLAINTEXT,LISTENER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
    healthcheck:
      test: "/usr/bin/kafka-topics --bootstrap-server kafka-1:19092 --list"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-2
    hostname: kafka-2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: LISTENER_INTERNAL://kafka-2:19093,LISTENER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_INTERNAL:PLAINTEXT,LISTENER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
    healthcheck:
      test: "/usr/bin/kafka-topics --bootstrap-server kafka-2:19093 --list"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-3
    hostname: kafka-3
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: LISTENER_INTERNAL://kafka-3:19094,LISTENER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_INTERNAL:PLAINTEXT,LISTENER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
    healthcheck:
      test: "/usr/bin/kafka-topics --bootstrap-server kafka-3:19094 --list"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka_init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "/scripts/docker-create-topics.sh" ]
    volumes:
      - ./platform-services/kafka/docker-create-topics.sh:/scripts/docker-create-topics.sh:ro
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"

  schema-registry:
    container_name: schema_registry
    image: confluentinc/cp-schema-registry:latest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-1:19092,PLAINTEXT://kafka-2:19093,PLAINTEXT://kafka-3:19094
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  schema-init:
    build:
      context: ./platform-services/schemas
      dockerfile: Dockerfile
    image: schema-init:latest
    container_name: schema_init
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./platform-services/schemas:/schemas:ro

  ods-source:
    container_name: ods_source
    build:
      context: ./source-apps/ods-source
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      RAW_TOPIC: raw_sales_orders
      PRODUCER_INTERVAL_MS: 1500
    restart: on-failure

  ods-processor:
    container_name: ods_processor
    build:
      context: ./process-apps/ods-processor
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      APP_RAW_SALES_ORDERS_TOPIC: raw_sales_orders
      APP_SALES_ORDER_TOPIC: sales_order
      APP_SALES_ORDER_LINE_ITEM_TOPIC: sales_order_line_item
      APP_CUSTOMER_SALES_TOPIC: customer_sales
      APP_CONSUMER_GROUP_ID: realtime-flink-processor-local
      APP_CHECKPOINT_INTERVAL_MS: 10000
    restart: on-failure
    volumes:
      - minio-data:/data

  trino:
    container_name: trino
    image: trinodb/trino:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
      snowflake-mimic:
        condition: service_started
    ports:
      - "8086:8080"
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/catalog:/etc/trino/catalog:ro

  iceberg-writer:
    container_name: iceberg_writer
    build:
      context: ./process-apps/iceberg-writer
    depends_on:
      kafka-1:
        condition: service_healthy
      schema-registry:
        condition: service_started
      trino:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ICEBERG_WRITER_GROUP_ID: iceberg-writer
      ICEBERG_WRITER_OFFSET_RESET: earliest
      ICEBERG_WRITER_BATCH_SIZE: 50
      ICEBERG_WRITER_POLL_TIMEOUT_MS: 1000
      ICEBERG_WRITER_FLUSH_INTERVAL_MS: 5000
      TRINO_URL: http://trino:8080
      TRINO_USER: analytics
      ICEBERG_CATALOG: lakehouse
      ICEBERG_SCHEMA: bronze
    restart: on-failure

  snowflake-mimic:
    container_name: snowflake-mimic
    image: postgres:14
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./analytics/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mdm-source:
    container_name: mdm_source
    build:
      context: ./source-apps/mdm-source
      dockerfile: Dockerfile
    ports:
      - "${MDM_SOURCE_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mdmroot
      MYSQL_DATABASE: mdm
      MDM_SOURCE_INTERVAL_SEC: 30
      MDM_INSERT_NEW_KEY_PROB: 0.9
      MDM_APP_MYSQL_USER: mdm
      MDM_APP_MYSQL_PASSWORD: mdm
    volumes:
      - mdm-source-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD --protocol=socket
            --silent",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    restart: on-failure

  dbz-connect:
    container_name: dbz_connect
    build:
      context: ./kafka-connect/dbz-connect
      dockerfile: Dockerfile
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
      mdm-source:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      CONNECT_GROUP_ID: dbz-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: dbz-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: dbz-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: dbz-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: dbz-connect
      CONNECT_PLUGIN_PATH: /usr/share/confluent-hub-components,/usr/share/java

  dbz-connect-init:
    image: alpine:3.19
    container_name: dbz_connect_init
    depends_on:
      dbz-connect:
        condition: service_started
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "apk add --no-cache jq curl && sh /scripts/register-dbz-connectors.sh"
    volumes:
      - ./kafka-connect/scripts:/scripts:ro
      - ./kafka-connect/dbz-connect/connector-configs:/connectors:ro
    environment:
      CONNECT_URL: http://dbz-connect:8083
    restart: on-failure

  ods-connect:
    container_name: ods-connect
    build:
      context: ./kafka-connect/ods-connect
      dockerfile: Dockerfile
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      snowflake-mimic:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
    ports:
      - "8087:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      CONNECT_GROUP_ID: connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: ods-connect
      CONNECT_PLUGIN_PATH: /usr/share/confluent-hub-components,/usr/share/java
    networks:
      default:
        aliases:
          - connect

  mdm-connect-init:
    image: alpine:3.19
    container_name: mdm_connect_init
    depends_on:
      mdm-connect:
        condition: service_started
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "apk add --no-cache jq curl && sh /scripts/register-mdm-connectors.sh"
    volumes:
      - ./kafka-connect/scripts:/scripts:ro
      - ./kafka-connect/mdm-connect/connector-configs:/connectors:ro
    environment:
      CONNECT_URL: http://mdm-connect:8083
    restart: on-failure

  mdm-connect:
    container_name: mdm_connect
    build:
      context: ./kafka-connect/mdm-connect
      dockerfile: Dockerfile
    ports:
      - "8085:8083"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      snowflake-mimic:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
      mdm-source:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      CONNECT_GROUP_ID: mdm-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: mdm-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: mdm-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: mdm-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_REST_ADVERTISED_HOST_NAME: mdm-connect
      CONNECT_PLUGIN_PATH: /usr/share/confluent-hub-components,/usr/share/java
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ods-connect-init:
    image: alpine:3.19
    container_name: ods-connect-init
    depends_on:
      ods-connect:
        condition: service_started
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "apk add --no-cache jq curl && sh /scripts/register-ods-connectors.sh"
    volumes:
      - ./kafka-connect/scripts:/scripts:ro
      - ./kafka-connect/ods-connect/connector-configs:/connectors:ro
    environment:
      CONNECT_URL: http://ods-connect:8083
    restart: on-failure

  mdm-cdc-curate:
    container_name: mdm_cdc_curate
    build:
      context: ./process-apps/mdm-cdc-curate
    depends_on:
      kafka-1:
        condition: service_healthy
      dbz-connect-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19093,kafka-3:19094
      MDM_CDC_GROUP_ID: mdm-cdc-publisher
      CDC_CONSUMER_OFFSET_RESET: earliest
    restart: on-failure

  mdm-rds-pg:
    container_name: mdm_rds_pg
    build:
      context: ./process-apps/mdm-rds-pg
    depends_on:
      mdm-source:
        condition: service_healthy
      snowflake-mimic:
        condition: service_started
    environment:
      MDM_MYSQL_HOST: mdm-source
      MDM_MYSQL_PORT: 3306
      MDM_MYSQL_DB: mdm
      MDM_MYSQL_USER: root
      MDM_MYSQL_PASSWORD: mdmroot
      POSTGRES_HOST: snowflake-mimic
      POSTGRES_PORT: 5432
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      MDM_SYNC_INTERVAL_SEC: 15
    command:
      - /opt/spark/bin/spark-submit
      - --conf
      - spark.jars.ivy=/tmp/.ivy
      - --packages
      - org.postgresql:postgresql:42.7.4,com.mysql:mysql-connector-j:8.4.0
      - /app/main.py
    restart: on-failure

  dbt:
    container_name: dbt
    build:
      context: ./analytics/dbt
      dockerfile: Dockerfile
    depends_on:
      snowflake-mimic:
        condition: service_started
      ods-connect-init:
        condition: service_completed_successfully
    volumes:
      - ./analytics/dbt:/dbt
    command: >-
      bash -lc "dbt deps --project-dir /dbt --profiles-dir /dbt && dbt run
      --project-dir /dbt --profiles-dir /dbt"

  airflow:
    container_name: airflow
    build:
      context: ./platform-services/airflow
      dockerfile: Dockerfile
    depends_on:
      snowflake-mimic:
        condition: service_started
    ports:
      - "8084:8080"
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: local-airflow-secret
      AIRFLOW_ADMIN_USERNAME: admin
      AIRFLOW_ADMIN_PASSWORD: admin
    volumes:
      - airflow-data:/opt/airflow
      - ./platform-services/airflow/dags:/opt/airflow/dags:ro
      - ./analytics/dbt:/opt/airflow/dbt
      - ./platform-services/airflow/start-airflow.sh:/opt/airflow/scripts/start-airflow.sh:ro
    entrypoint: [ "/bin/sh", "/opt/airflow/scripts/start-airflow.sh" ]

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    depends_on:
      - kafka-1
      - trino
      - dbz-connect
      - ods-connect
      - mdm-connect
      - airflow
      - blackbox-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  blackbox-exporter:
    container_name: blackbox_exporter
    image: prom/blackbox-exporter:latest
    ports:
      - "9115:9115"
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  openmetadata-db:
    container_name: openmetadata_db
    image: mysql:latest
    profiles: [ "openmetadata" ]
    environment:
      MYSQL_ROOT_PASSWORD: openmetadata_root
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_pass
    ports:
      - "3307:3306"
    volumes:
      - openmetadata-db-data:/var/lib/mysql

  openmetadata-search:
    container_name: openmetadata_search
    image: docker.elastic.co/elasticsearch:8.14.3
    profiles: [ "openmetadata" ]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data

  openmetadata-server:
    container_name: openmetadata_server
    image: openmetadata/server:1.5.8
    profiles: [ "openmetadata" ]
    depends_on:
      - openmetadata-db
      - openmetadata-search
    environment:
      OPENMETADATA_CLUSTER_NAME: local
      SERVER_HOST_API_URL: http://openmetadata-server:8585/api
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_HOST: openmetadata-db
      DB_PORT: "3306"
      OM_DATABASE: openmetadata_db
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_pass
      ELASTICSEARCH_HOST: openmetadata-search
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
    ports:
      - "8585:8585"

  openmetadata-ingestion:
    container_name: openmetadata_ingestion
    image: openmetadata/ingestion:1.5.8
    profiles: [ "openmetadata" ]
    depends_on:
      - openmetadata-server
    entrypoint: [ "/bin/bash", "-lc", "sleep infinity" ]
    volumes:
      - ./platform-services/metadata/openmetadata:/opt/openmetadata/metadata
      - ./analytics/dbt:/opt/openmetadata/metadata/analytics/dbt:ro
      - airflow-data:/opt/airflow:ro

  conduktor-db:
    container_name: conduktor_db
    image: postgres:14
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "db_prod" ]
      interval: 10s
      timeout: 60s
      retries: 10
      start_period: 80s
    environment:
      POSTGRES_DB: conduktor
      POSTGRES_USER: conduktor
      POSTGRES_PASSWORD: conduktor
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - conduktor-db-data:/var/lib/postgresql/data

  conduktor:
    container_name: conduktor
    image: conduktor/conduktor-console:1.28.0
    ports:
      - "8088:8080"
    environment:
      CDK_ORGANIZATION_NAME: "local"
      CDK_ADMIN_EMAIL: "admin"
      CDK_ADMIN_PASSWORD: "admin"
      CDK_KAFKA_BROKERS: "kafka-1:19092,kafka-2:19093,kafka-3:19094"
      CDK_DATABASE_URL: "postgresql://conduktor:conduktor@conduktor-db:5432/conduktor"
      CDK_DATABASE_USERNAME: "conduktor"
      CDK_DATABASE_PASSWORD: "conduktor"
      CDK_CLUSTERS_0_ID: "local-kafka"
      CDK_CLUSTERS_0_NAME: "local-kafka"
      CDK_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:19092,kafka-2:19093,kafka-3:19094"
      CDK_CLUSTERS_0_SCHEMAREGISTRY_ID: "confluent-sr"
      CDK_CLUSTERS_0_SCHEMAREGISTRY_URL: "http://schema-registry:8081"
      CDK_CLUSTERS_0_COLOR: "#6A57C8"
      CDK_CLUSTERS_0_ICON: "kafka"
      CDK_CLUSTERS_0_KAFKACONNECTS_0_ID: "mdm-connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_0_NAME: "MDM Kafka Connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_0_URL: "http://mdm-connect:8083"
      CDK_CLUSTERS_0_KAFKACONNECTS_1_ID: "dbz-connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_1_NAME: "Debezium Kafka Connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_1_URL: "http://dbz-connect:8083"
      CDK_CLUSTERS_0_KAFKACONNECTS_2_ID: "ods-connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_2_NAME: "ODS Kafka Connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_2_URL: "http://ods-connect:8083"
    depends_on:
      kafka-1:
        condition: service_healthy
      schema-registry:
        condition: service_started
      ods-connect:
        condition: service_started
      mdm-connect:
        condition: service_started
      dbz-connect:
        condition: service_started
      conduktor-db:
        condition: service_started

volumes:
  airflow-data:
  minio-data:
  postgres-data:
  mdm-source-data:
  prometheus-data:
  grafana-data:
  openmetadata-db-data:
  openmetadata-es-data:
  conduktor-db-data:

networks:
  default:
    name: genai-enabled-data-platform-architecture-and-engineering_default
