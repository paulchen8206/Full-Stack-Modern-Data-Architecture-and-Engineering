---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-dev-realtime-app-schema-registry
  labels:
    app.kubernetes.io/name: realtime-app
    app.kubernetes.io/component: schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime-app
      app.kubernetes.io/component: schema-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime-app
        app.kubernetes.io/component: schema-registry
    spec:
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.5.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "PLAINTEXT://realtime-dev-realtime-app-kafka:9092"
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: "realtime-dev-realtime-app-schema-registry"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-dev-realtime-app-schema-registry
  labels:
    app.kubernetes.io/name: realtime-app
    app.kubernetes.io/component: schema-registry
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: realtime-app
    app.kubernetes.io/component: schema-registry
