services:
  minio:
    container_name: minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "( /usr/bin/kafka-topics --bootstrap-server localhost:9092 --list || /usr/bin/kafka-topics --bootstrap-server localhost:9094 --list ) > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/docker-create-topics.sh"]
    volumes:
      - ./scripts/docker-create-topics.sh:/scripts/docker-create-topics.sh:ro
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"

  schema-registry:
    container_name: schema-registry
    image: confluentinc/cp-schema-registry:latest
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092

  schema-init:
    build:
      context: .
      dockerfile: Dockerfile.schema-init
    image: schema-init:latest
    container_name: schema-init
    depends_on:
      schema-registry:
        condition: service_started
    volumes:
      - ./schemas:/schemas:ro

  producer:
    container_name: producer
    build:
      context: ./producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAW_TOPIC: raw_sales_orders
      PRODUCER_INTERVAL_MS: 1500
    restart: on-failure

  processor:
    container_name: processor
    build:
      context: ./processor
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      APP_RAW_SALES_ORDERS_TOPIC: raw_sales_orders
      APP_SALES_ORDER_TOPIC: sales_order
      APP_SALES_ORDER_LINE_ITEM_TOPIC: sales_order_line_item
      APP_CUSTOMER_SALES_TOPIC: customer_sales
      APP_CONSUMER_GROUP_ID: realtime-flink-processor-local
      APP_CHECKPOINT_INTERVAL_MS: 10000
    restart: on-failure
    volumes:
      - minio-data:/data

  minio-init:
    container_name: minio-init
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: [ "/bin/sh", "/scripts/init-minio.sh" ]
    volumes:
      - ./scripts/init-minio.sh:/scripts/init-minio.sh:ro

  trino:
    container_name: trino
    image: trinodb/trino:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    ports:
      - "8086:8080"
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/catalog:/etc/trino/catalog:ro

  iceberg-writer:
    container_name: iceberg-writer
    build:
      context: ./iceberg-writer
    depends_on:
      trino:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ICEBERG_WRITER_GROUP_ID: iceberg-writer
      ICEBERG_WRITER_OFFSET_RESET: earliest
      ICEBERG_WRITER_BATCH_SIZE: 50
      ICEBERG_WRITER_POLL_TIMEOUT_MS: 1000
      ICEBERG_WRITER_FLUSH_INTERVAL_MS: 5000
      TRINO_URL: http://trino:8080
      TRINO_USER: analytics
      ICEBERG_CATALOG: lakehouse
      ICEBERG_SCHEMA: streaming
    restart: on-failure

  postgres:
    container_name: postgres
    image: postgres:14
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./analytics/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql-mdm:
    container_name: mysql-mdm
    image: mysql:latest
    command:
      - --server-id=223344
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mdmroot
      MYSQL_DATABASE: mdm
    volumes:
      - mysql-mdm-data:/var/lib/mysql
      - ./mdm/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mdm-writer:
    container_name: mdm-writer
    build:
      context: ./mdm-writer
    depends_on:
      mysql-mdm:
        condition: service_started
    environment:
      MDM_MYSQL_HOST: mysql-mdm
      MDM_MYSQL_PORT: 3306
      MDM_MYSQL_USER: root
      MDM_MYSQL_PASSWORD: mdmroot
      MDM_MYSQL_DB: mdm
      MDM_WRITE_INTERVAL_MS: 3000
    restart: on-failure

  connect:
    container_name: connect
    image: debezium/connect:2.5
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: connect-cluster-1
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

  connect-init:
    image: ghcr.io/jqlang/jq:latest
    container_name: connect-init
    depends_on:
      connect:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/docker-register-connectors.sh"]
    volumes:
      - ./scripts/docker-register-connectors.sh:/scripts/docker-register-connectors.sh:ro
      - ./connect/connector-configs:/connectors:ro

  mdm-connect:
    container_name: mdm-connect
    image: quay.io/debezium/connect:latest
    depends_on:
      mysql-mdm:
        condition: service_started
    ports:
      - "8085:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: mdm-connect-cluster
      CONFIG_STORAGE_TOPIC: mdm-connect-configs
      OFFSET_STORAGE_TOPIC: mdm-connect-offsets
      STATUS_STORAGE_TOPIC: mdm-connect-status
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

  mdm-cdc-producer:
    container_name: mdm-cdc-producer
    build:
      context: ./mdm-cdc-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MDM_CDC_GROUP_ID: mdm-cdc-publisher
      CDC_CONSUMER_OFFSET_RESET: earliest
    restart: on-failure

  mdm-pyspark-sync:
    container_name: mdm-pyspark-sync
    build:
      context: ./mdm-pyspark-sync
    depends_on:
      mysql-mdm:
        condition: service_started
      postgres:
        condition: service_started
      mdm-writer:
        condition: service_started
    environment:
      MDM_MYSQL_HOST: mysql-mdm
      MDM_MYSQL_PORT: 3306
      MDM_MYSQL_DB: mdm
      MDM_MYSQL_USER: root
      MDM_MYSQL_PASSWORD: mdmroot
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      MDM_SYNC_INTERVAL_SEC: 15
    command:
      - /opt/spark/bin/spark-submit
      - --conf
      - spark.jars.ivy=/tmp/.ivy
      - --packages
      - org.postgresql:postgresql:42.7.4,com.mysql:mysql-connector-j:8.4.0
      - /app/main.py
    restart: on-failure

  dbt:
    container_name: dbt
    build:
      context: ./analytics/dbt
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./analytics/dbt:/dbt
    command: >-
      bash -lc "dbt deps --project-dir /dbt --profiles-dir /dbt && dbt run
      --project-dir /dbt --profiles-dir /dbt"

  airflow:
    container_name: airflow
    build:
      context: ./airflow
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
    ports:
      - "8084:8080"
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: local-airflow-secret
      AIRFLOW_ADMIN_USERNAME: admin
      AIRFLOW_ADMIN_PASSWORD: admin
    volumes:
      - airflow-data:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./analytics/dbt:/opt/airflow/dbt
      - ./scripts/start-airflow.sh:/opt/airflow/scripts/start-airflow.sh:ro
    entrypoint: [ "/bin/sh", "/opt/airflow/scripts/start-airflow.sh" ]

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    depends_on:
      - kafka
      - trino
      - connect
      - mdm-connect
      - airflow
      - blackbox-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  blackbox-exporter:
    container_name: blackbox-exporter
    image: prom/blackbox-exporter:latest
    ports:
      - "9115:9115"
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  openmetadata-db:
    container_name: openmetadata-db
    image: mysql:latest
    profiles: [ "openmetadata" ]
    environment:
      MYSQL_ROOT_PASSWORD: openmetadata_root
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_pass
    ports:
      - "3307:3306"
    volumes:
      - openmetadata-db-data:/var/lib/mysql

  openmetadata-search:
    container_name: openmetadata-search
    image: docker.elastic.co/elasticsearch:8.14.3
    profiles: [ "openmetadata" ]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data

  openmetadata-server:
    container_name: openmetadata-server
    image: openmetadata/server:1.5.8
    profiles: [ "openmetadata" ]
    depends_on:
      - openmetadata-db
      - openmetadata-search
    environment:
      OPENMETADATA_CLUSTER_NAME: local
      SERVER_HOST_API_URL: http://openmetadata-server:8585/api
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_HOST: openmetadata-db
      DB_PORT: "3306"
      OM_DATABASE: openmetadata_db
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_pass
      ELASTICSEARCH_HOST: openmetadata-search
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
    ports:
      - "8585:8585"

  openmetadata-ingestion:
    container_name: openmetadata-ingestion
    image: openmetadata/ingestion:1.5.8
    profiles: [ "openmetadata" ]
    depends_on:
      - openmetadata-server
    entrypoint: [ "/bin/bash", "-lc", "sleep infinity" ]
    volumes:
      - ./metadata/openmetadata:/opt/openmetadata/metadata
      - ./analytics/dbt:/opt/openmetadata/metadata/analytics/dbt:ro
      - airflow-data:/opt/airflow:ro

  conduktor-db:
    container_name: conduktor-db
    image: postgres:14
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "db_prod" ]
      interval: 10s
      timeout: 60s
      retries: 10
      start_period: 80s
    environment:
      POSTGRES_DB: conduktor
      POSTGRES_USER: conduktor
      POSTGRES_PASSWORD: conduktor
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"    
    ports:
      - "5433:5432"
    volumes:
      - conduktor-db-data:/var/lib/postgresql/data

  conduktor:
    container_name: conduktor
    image: conduktor/conduktor-console:1.28.0
    ports:
      - "8088:8080"
    environment:
      CDK_ORGANIZATION_NAME: "local"
      CDK_ADMIN_EMAIL: "admin@local.io"
      CDK_ADMIN_PASSWORD: "admin"
      CDK_KAFKA_BROKERS: "kafka:9092"
      CDK_DATABASE_URL: "postgresql://conduktor:conduktor@conduktor-db:5432/conduktor"
      CDK_DATABASE_USERNAME: "conduktor"
      CDK_DATABASE_PASSWORD: "conduktor"
      CDK_CLUSTERS_0_ID: "local-kafka"
      CDK_CLUSTERS_0_NAME: "local-kafka"
      CDK_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      CDK_CLUSTERS_0_SCHEMAREGISTRY_ID: "confluent-sr"
      CDK_CLUSTERS_0_SCHEMAREGISTRY_URL: "http://schema-registry:8081"
      CDK_CLUSTERS_0_COLOR: "#6A57C8"
      CDK_CLUSTERS_0_ICON: "kafka"
      CDK_CLUSTERS_0_KAFKACONNECTS_0_ID: "kafka-connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_0_NAME: "My Kafka Connect"
      CDK_CLUSTERS_0_KAFKACONNECTS_0_URL: "http://connect:8083"
    depends_on:
      kafka:
        condition: service_healthy
      conduktor-db:
        condition: service_started

volumes:
  airflow-data:
  minio-data:
  postgres-data:
  mysql-mdm-data:
  prometheus-data:
  grafana-data:
  openmetadata-db-data:
  openmetadata-es-data:
  conduktor-db-data:
