{{- if and (hasKey .Values "legacyConnectTemplate") .Values.legacyConnectTemplate.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-dev-vision-ods-connect
  labels:
    app.kubernetes.io/name: realtime-app
    app.kubernetes.io/component: ods-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime-app
      app.kubernetes.io/component: ods-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime-app
        app.kubernetes.io/component: ods-connect
    spec:
      containers:
        - name: ods-connect
          image: confluentinc/cp-kafka-connect:7.5.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: "PLAINTEXT://realtime-dev-vision-kafka:9092"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: "realtime-dev-vision-ods-connect"
            - name: CONNECT_GROUP_ID
              value: "ods-connect-cluster"
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "connect-statuses"
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_LOG4J_ROOT_LOGLEVEL
              value: "INFO"
            - name: CONNECT_PLUGIN_PATH
              value: "/usr/share/java"
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-dev-vision-ods-connect
  labels:
    app.kubernetes.io/name: realtime-app
    app.kubernetes.io/component: ods-connect
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: realtime-app
    app.kubernetes.io/component: ods-connect
{{- end }}
