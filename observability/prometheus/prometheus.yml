global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
- /etc/prometheus/alerts-kafka-lag.yml
scrape_configs:
- job_name: prometheus
  static_configs:
  - targets: ["prometheus:9090"]
- job_name: grafana
  static_configs:
  - targets: ["grafana:3000"]
- job_name: docker_services
  metrics_path: /probe
  params:
    module: [http_2xx]
  static_configs:
  - targets:
    - http://trino:8080/v1/info
    - http://airflow:8080/health
    - http://dbz-connect:8083/connectors
    - http://ods-connect:8083/connectors
    - http://mdm-connect:8083/connectors
    - https://grafana.com
    - https://prometheus.io
    - http://grafana:3000/api/health
    - http://prometheus:9090/-/ready
    - http://conduktor:8080/
    - http://minio:9000/minio/health/live
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115