schemaRegistry:
  enabled: true
nameOverride: ""
fullnameOverride: ""
producer:
  enabled: true
  replicas: 1
  image:
    repository: realtime-sales-producer
    tag: 0.1.0
    pullPolicy: IfNotPresent
  intervalMs: 1500
  rawTopic: raw_sales_orders
processor:
  enabled: true
  replicas: 1
  image:
    repository: realtime-sales-processor
    tag: 0.1.0
    pullPolicy: IfNotPresent
  topics:
    rawSalesOrders: raw_sales_orders
    salesOrder: sales_order
    salesOrderLineItem: sales_order_line_item
    customerSales: customer_sales
  consumerGroupId: realtime-flink-processor
  checkpointIntervalMs: 10000
  groupId: iceberg-writer
  offsetReset: earliest
  batchSize: 50
  pollTimeoutMs: 1000
  flushIntervalMs: 5000
  catalog: lakehouse
  schema: streaming
controlCenter:
  enabled: true
  replicas: 1
  image:
    repository: confluentinc/cp-enterprise-control-center
    tag: 7.5.3
    pullPolicy: IfNotPresent
  connectCluster: 'http://realtime-dev-realtime-app-ods-connect:8083'
  connectClusterName: 'ods-connect'
  schemaRegistryUrl: 'http://realtime-dev-realtime-app-schema-registry:8081'
  service:
    type: ClusterIP
    port: 9021
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
  rootUser: minio
  rootPassword: minio123
  bucket: warehouse
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
trino:
  enabled: false
  image:
    repository: trinodb/trino
    tag: "472"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    user: analytics
    password: analytics
    database: analytics
  service:
    type: ClusterIP
    port: 5432
odsConnect:
  enabled: false
  image:
    repository: realtime-sales-connect
    tag: 0.1.0
    pullPolicy: IfNotPresent
  curlImage:
    repository: curlimages/curl
    tag: 8.12.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
  groupId: ods-connect-cluster-1
  configStorageTopic: connect-configs
  offsetStorageTopic: connect-offsets
  statusStorageTopic: connect-status
dbt:
  enabled: false
  image:
    repository: realtime-sales-dbt
    tag: 0.1.0
    pullPolicy: IfNotPresent
airflow:
  enabled: false
  image:
    repository: realtime-sales-airflow
    tag: 0.1.0
    pullPolicy: IfNotPresent
  adminUsername: admin
  adminPassword: admin
  service:
    type: ClusterIP
    port: 8080
mdm:
  enabled: true
  mysql:
    image:
      repository: mysql
      tag: "8.4"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3306
    rootPassword: mdmroot
    database: mdm
    serverId: "223344"
  connect:
    replicas: 1
    image:
      repository: quay.io/debezium/connect
      tag: "3.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8083
    groupId: mdm-connect-cluster
    configStorageTopic: mdm-connect-configs
    offsetStorageTopic: mdm-connect-offsets
    statusStorageTopic: mdm-connect-status
    curlImage:
      repository: curlimages/curl
      tag: 8.12.1
      pullPolicy: IfNotPresent
  cdcProducer:
    replicas: 1
    image:
      repository: realtime-sales-mdm-cdc-producer
      tag: 0.1.0
      pullPolicy: IfNotPresent
    groupId: mdm-cdc-publisher
    offsetReset: earliest
  pysparkSync:
    replicas: 1
    image:
      repository: realtime-sales-mdm-pyspark-sync
      tag: 0.1.0
      pullPolicy: IfNotPresent
    syncIntervalSec: 15
observability:
  enabled: false
  prometheus:
    replicas: 1
    image:
      repository: prom/prometheus
      tag: v2.53.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9090
  loki:
    replicas: 1
    image:
      repository: grafana/loki
      tag: 2.9.8
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3100
  promtail:
    enabled: true
    image:
      repository: grafana/promtail
      tag: 2.9.8
      pullPolicy: IfNotPresent
  grafana:
    replicas: 1
    image:
      repository: grafana/grafana
      tag: 11.1.0
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    service:
      type: ClusterIP
      port: 3000
kafkaBootstrapServers: "realtime-dev-realtime-app-kafka:9092"
zookeeper:
  enabled: true
  image:
    repository: confluentinc/cp-zookeeper
    tag: 7.5.3
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 2181
kafka:
  enabled: true
  image:
    repository: confluentinc/cp-kafka
    tag: 7.5.3
    pullPolicy: IfNotPresent
  replicas: 1
  zookeeperConnect: "realtime-dev-realtime-app-zookeeper:2181"
  provisioning:
    enabled: true
    numPartitions: 3
    replicationFactor: 1
    topics:
    - name: raw_sales_orders
      partitions: 3
      replicationFactor: 1
    - name: sales_order
      partitions: 3
      replicationFactor: 1
    - name: sales_order_line_item
      partitions: 3
      replicationFactor: 1
    - name: customer_sales
      partitions: 3
      replicationFactor: 1
    - name: mdm_customer
      partitions: 3
      replicationFactor: 1
    - name: mdm_product
      partitions: 3
      replicationFactor: 1
    - name: mdm_mysql.mdm.customer360
      partitions: 3
      replicationFactor: 1
    - name: mdm_mysql.mdm.product_master
      partitions: 3
      replicationFactor: 1
    - name: connect-configs
      partitions: 1
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: connect-offsets
      partitions: 6
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: connect-status
      partitions: 3
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: connect-iceberg-control
      partitions: 3
      replicationFactor: 1
    - name: mdm-connect-configs
      partitions: 1
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: mdm-connect-offsets
      partitions: 6
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: mdm-connect-status
      partitions: 3
      replicationFactor: 1
      config:
        cleanup.policy: compact
kafkaBootstrapServers: "realtime-dev-realtime-app-kafka:9092"