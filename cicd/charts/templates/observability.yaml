{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-prometheus-config
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/alerts-kafka-lag.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
      - job_name: vision-static
        static_configs:
          - targets:
              - {{ include "vision.serviceName" (dict "root" . "key" "ods-processor") }}:8080
              - {{ include "vision.serviceName" (dict "root" . "key" "conduktor") }}:8080
{{- if .Values.observability.blackboxExporter.enabled }}
      - job_name: blackbox-http
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://{{ include "vision.serviceName" (dict "root" . "key" "trino") }}:8080/v1/info
              - http://{{ include "vision.serviceName" (dict "root" . "key" "schema-registry") }}:8081/subjects
              - http://{{ include "vision.serviceName" (dict "root" . "key" "conduktor") }}:8080
              - http://{{ include "vision.serviceName" (dict "root" . "key" "dbz-connect") }}:8083/connectors
              - http://{{ include "vision.serviceName" (dict "root" . "key" "ods-connect") }}:8083/connectors
              - http://{{ include "vision.serviceName" (dict "root" . "key" "mdm-connect") }}:8083/connectors
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: {{ include "vision.serviceName" (dict "root" . "key" "blackbox-exporter") }}:9115
{{- end }}
  alerts-kafka-lag.yml: |
    groups:
      - name: kafka-topic-lag-alerts
        rules:
          - alert: KafkaTopicMaxLagInSecondsHigh
            expr: max by (topic) (maxlaginsec{topic!=""}) > 300
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kafka topic lag is high"
              description: "Topic {{`{{`}} $labels.topic {{`}}`}} maxlaginsec has been above 300 seconds for 5m (current value: {{`{{`}} $value {{`}}`}})."
          - alert: KafkaTopicMaxLagInSecondsCritical
            expr: max by (topic) (maxlaginsec{topic!=""}) > 900
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Kafka topic lag is critical"
              description: "Topic {{`{{`}} $labels.topic {{`}}`}} maxlaginsec has been above 900 seconds for 10m (current value: {{`{{`}} $value {{`}}`}})."
      - name: kafka-connect-error-alerts
        rules:
          - alert: KafkaConnectEndpointDown
            expr: max by (instance) (probe_success{job=~"docker_services|blackbox-http",instance=~".*(dbz-connect|ods-connect|mdm-connect):8083/connectors$"}) < 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Kafka Connect endpoint is down"
              description: "Kafka Connect endpoint {{`{{`}} $labels.instance {{`}}`}} has failed health probes for more than 2m."
      - name: flink-error-alerts
        rules:
          - alert: FlinkProcessorErrorSuspected
            expr: max by (topic) (maxlaginsec{topic="raw_sales_orders"}) > 600
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Flink processor error suspected"
              description: "Input topic {{`{{`}} $labels.topic {{`}}`}} maxlaginsec stayed above 600 seconds for 10m, indicating possible Flink processing failure/backpressure (current value: {{`{{`}} $value {{`}}`}})."
          - alert: FlinkProcessorErrorCritical
            expr: max by (topic) (maxlaginsec{topic="raw_sales_orders"}) > 900
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Flink processor lag is critical"
              description: "Input topic {{`{{`}} $labels.topic {{`}}`}} maxlaginsec stayed above 900 seconds for 10m, indicating likely Flink processing outage/severe backlog (current value: {{`{{`}} $value {{`}}`}})."
{{- if .Values.observability.loki.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-loki-config
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      filesystem:
        directory: /loki/chunks
    analytics:
      reporting_enabled: false
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-grafana-datasources
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "vision.serviceName" (dict "root" . "key" "prometheus") }}:9090
        isDefault: true
{{- if .Values.observability.loki.enabled }}
      - name: Loki
        type: loki
        access: proxy
        url: http://{{ include "vision.serviceName" (dict "root" . "key" "loki") }}:3100
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-grafana-dashboard-provider
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: vision-starter
        orgId: 1
        folder: Realtime App
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-grafana-dashboard-starter
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
data:
  realtime-starter.json: |
    {
      "id": null,
      "uid": "realtime-starter",
      "title": "Realtime App Starter",
      "tags": ["realtime", "starter"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "title": "Targets Up",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum by (job) (up)",
              "legendFormat": "job",
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "Prometheus Scrape Samples",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "rate(scrape_samples_scraped[5m])",
              "legendFormat": "job",
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          }
        }
{{- if .Values.observability.loki.enabled }}
        ,
        {
          "id": 3,
          "title": "Loki Log Volume (5m)",
          "type": "timeseries",
          "datasource": "Loki",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "expr": "sum(count_over_time({job=\"kubernetes-pods\", namespace=\"{{ .Release.Namespace }}\"}[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          }
        }
{{- end }}
      ]
    }
{{- if and .Values.observability.promtail.enabled .Values.observability.loki.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-promtail-config
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://{{ include "vision.serviceName" (dict "root" . "key" "loki") }}:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: {{ .Release.Namespace }}
              __path__: /var/log/pods/{{ .Release.Namespace }}_*/*/*.log
{{- end }}
{{- if .Values.observability.blackboxExporter.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vision.fullname" . }}-blackbox-config
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: blackbox-exporter
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          method: GET
          preferred_ip_protocol: ip4
          valid_status_codes: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-blackbox-exporter
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: blackbox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: blackbox-exporter
    spec:
      containers:
        - name: blackbox-exporter
          image: {{ .Values.observability.blackboxExporter.image.repository }}:{{ .Values.observability.blackboxExporter.image.tag }}
          imagePullPolicy: {{ .Values.observability.blackboxExporter.image.pullPolicy }}
          args:
            - --config.file=/etc/blackbox_exporter/config.yml
          ports:
            - containerPort: 9115
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox_exporter/config.yml
              subPath: blackbox.yml
      volumes:
        - name: config
          configMap:
            name: {{ include "vision.fullname" . }}-blackbox-config
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-prometheus
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
spec:
  replicas: {{ .Values.observability.prometheus.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}
          imagePullPolicy: {{ .Values.observability.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/alerts-kafka-lag.yml
              subPath: alerts-kafka-lag.yml
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "vision.fullname" . }}-prometheus-config
        - name: data
          emptyDir: {}
{{- if .Values.observability.loki.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-loki
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
spec:
  replicas: {{ .Values.observability.loki.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: loki
    spec:
      containers:
        - name: loki
          image: {{ .Values.observability.loki.image.repository }}:{{ .Values.observability.loki.image.tag }}
          imagePullPolicy: {{ .Values.observability.loki.image.pullPolicy }}
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yaml
              subPath: loki.yaml
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: {{ include "vision.fullname" . }}-loki-config
        - name: data
          emptyDir: {}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision.fullname" . }}-grafana
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
spec:
  replicas: {{ .Values.observability.grafana.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image.repository }}:{{ .Values.observability.grafana.image.tag }}
          imagePullPolicy: {{ .Values.observability.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.observability.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.observability.grafana.adminPassword | quote }}
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboard-starter
              mountPath: /var/lib/grafana/dashboards/realtime-starter.json
              subPath: realtime-starter.json
      volumes:
        - name: datasources
          configMap:
            name: {{ include "vision.fullname" . }}-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: {{ include "vision.fullname" . }}-grafana-dashboard-provider
        - name: dashboard-starter
          configMap:
            name: {{ include "vision.fullname" . }}-grafana-dashboard-starter
{{- if and .Values.observability.promtail.enabled .Values.observability.loki.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "vision.fullname" . }}-promtail
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: promtail
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vision.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vision.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: promtail
    spec:
      containers:
        - name: promtail
          image: {{ .Values.observability.promtail.image.repository }}:{{ .Values.observability.promtail.image.tag }}
          imagePullPolicy: {{ .Values.observability.promtail.image.pullPolicy }}
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail/promtail.yaml
              subPath: promtail.yaml
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: run
              mountPath: /run/promtail
      volumes:
        - name: config
          configMap:
            name: {{ include "vision.fullname" . }}-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: run
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vision.serviceName" (dict "root" . "key" "prometheus") }}
  labels:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
spec:
  type: {{ .Values.observability.prometheus.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "vision.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.service.port }}
      targetPort: 9090
{{- if .Values.observability.loki.enabled }}
---
