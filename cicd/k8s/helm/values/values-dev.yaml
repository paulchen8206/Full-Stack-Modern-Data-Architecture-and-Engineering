# Dev environment overrides.
# Only values that differ from cicd/charts/values.yaml defaults are listed here.
# ArgoCD Application CR is NOT embedded in local helm-up; use `make k8s-argocd-apply`
# to bootstrap the Application in the GitOps workflow (after pushing chart changes to git).
argocd:
  enabled: false
processor:
  consumerGroupId: realtime-flink-processor-local
icebergWriter:
  enabled: true
  schema: bronze
minio:
  enabled: true
trino:
  enabled: true
postgres:
  enabled: true
  image:
    tag: "14"
odsConnect:
  enabled: true
  groupId: ods-connect-cluster
  curlImage:
    repository: curlimages/curl
    tag: 8.12.1
    pullPolicy: IfNotPresent
dbt:
  enabled: true
airflow:
  enabled: true
mdm:
  connect:
    curlImage:
      repository: curlimages/curl
      tag: 8.12.1
      pullPolicy: IfNotPresent
dbzConnect:
  enabled: true
  curlImage:
    repository: curlimages/curl
    tag: 8.12.1
    pullPolicy: IfNotPresent
conduktor:
  enabled: true
observability:
  enabled: true
  loki:
    enabled: false
  promtail:
    enabled: false
  blackboxExporter:
    enabled: true
# Kafka topics for dev: includes dbz-connect topics; omits connect-iceberg-control.
# Compact policies are not enforced in dev to simplify resets.
kafka:
  provisioning:
    topics:
    - name: raw_sales_orders
      partitions: 3
      replicationFactor: 1
    - name: sales_order
      partitions: 3
      replicationFactor: 1
    - name: sales_order_line_item
      partitions: 3
      replicationFactor: 1
    - name: customer_sales
      partitions: 3
      replicationFactor: 1
    - name: mdm_customer
      partitions: 3
      replicationFactor: 1
    - name: mdm_product
      partitions: 3
      replicationFactor: 1
    - name: mdm_mysql.mdm.customer360
      partitions: 3
      replicationFactor: 1
    - name: mdm_mysql.mdm.product_master
      partitions: 3
      replicationFactor: 1
    - name: connect-configs
      partitions: 1
      replicationFactor: 1
    - name: connect-offsets
      partitions: 6
      replicationFactor: 1
    - name: connect-status
      partitions: 3
      replicationFactor: 1
    - name: mdm-connect-configs
      partitions: 1
      replicationFactor: 1
    - name: mdm-connect-offsets
      partitions: 6
      replicationFactor: 1
    - name: mdm-connect-status
      partitions: 3
      replicationFactor: 1
    - name: dbz-connect-configs
      partitions: 1
      replicationFactor: 1
    - name: dbz-connect-offsets
      partitions: 6
      replicationFactor: 1
    - name: dbz-connect-status
      partitions: 3
      replicationFactor: 1